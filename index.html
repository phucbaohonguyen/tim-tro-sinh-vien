<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nền tảng tìm trọ sinh viên</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#2c7be5;
color:white;
padding:20px;
text-align:center;
}

nav{
background:#1b5edb;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
text-decoration:underline;
}

.container{
width:85%;
margin:auto;
margin-top:30px;
}

.search-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:200px;
margin-right:10px;
}

button{
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.rooms{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-top:20px;
}

.room-card{
background:white;
width:300px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
overflow:hidden;
transition:0.3s;
}

.room-card:hover{
transform:translateY(-5px);
box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

.room-card img{
width:100%;
height:180px;
object-fit:cover;
}

.room-info{
padding:15px;
}

footer{
margin-top:40px;
background:#eee;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<h1>NỀN TẢNG TÌM TRỌ SINH VIÊN</h1>
<p>Kết nối sinh viên với phòng trọ minh bạch</p>

</header>

<nav>

<a href="#">Trang chủ</a>
<a href="#">Tìm phòng</a>
<a href="#">Đăng phòng</a>
<a href="#">Liên hệ</a>

</nav>

<div class="container">

<div class="search-box">

<h2>Tìm phòng trọ</h2>

<input id="areaInput" type="text" placeholder="Nhập khu vực">
<input id="priceInput" type="number" placeholder="Giá tối đa">

<button onclick="searchRoom()">Tìm kiếm</button>

</div>

<div class="rooms" id="roomContainer"></div>

</div>

<footer>

<p>© 2026 Nền tảng tìm trọ sinh viên</p>

</footer>


<script>

/* DATA từ file Excel */

const roomsData = [

{area:"Đông Hòa",price:2000000,address:"15/30 Đường 7 KP Đông Tác"},
{area:"Đông Hòa",price:1800000,address:"10/9 KP Tân Lập Đông Hòa"},
{area:"Đông Hòa",price:2500000,address:"10/9 KP Tân Lập Đông Hòa"},
{area:"Đông Hòa",price:3200000,address:"49 Tân Lập Đông Hòa"},
{area:"Dĩ An",price:2000000,address:"Trung tâm Dĩ An"},
{area:"Thủ Đức",price:3000000,address:"Linh Trung"},
{area:"Suối Tiên",price:2200000,address:"Gần Khu du lịch Suối Tiên"},
{area:"Linh Trung",price:3500000,address:"58 Đường số 5 Linh Trung"},
{area:"Đông Hòa",price:2500000,address:"Gần làng đại học"},
{area:"Thủ Đức",price:2800000,address:"Gần KTX khu A"}

];


/* hiển thị phòng ban đầu */

displayRooms(roomsData);


/* chức năng tìm kiếm */

function searchRoom(){

let area = document.getElementById("areaInput").value.toLowerCase();

let price = document.getElementById("priceInput").value;

let result = roomsData.filter(room=>{

let matchArea = room.area.toLowerCase().includes(area);

let matchPrice = price=="" || room.price <= price;

return matchArea && matchPrice;

});

displayRooms(result);

}


/* hiển thị phòng */

function displayRooms(rooms){

let container = document.getElementById("roomContainer");

container.innerHTML="";

rooms.forEach(room=>{

container.innerHTML += `

<div class="room-card">

<img src="https://images.unsplash.com/photo-1560185127-6ed189bf02f4">

<div class="room-info">

<h3>Phòng trọ sinh viên</h3>

<p>💰 Giá: ${room.price.toLocaleString()} VNĐ</p>

<p>📍 ${room.address}</p>

</div>

</div>

`;

});

}

</script>


</body>
</html>
